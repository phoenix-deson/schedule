name: Daily Task Email

on:
  # 1. ⏰ 定时任务：北京时间每天 18:25 (UTC 10:25) 执行
  schedule:
    - cron: '17 10 * * *'

  # 2. 👆 保留手动触发按钮（方便随时测试）
  workflow_dispatch:

jobs:
  run-daily-job:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 配置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 安装依赖
        run: npm install

      - name: 执行发信脚本
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: node send-emails.js
