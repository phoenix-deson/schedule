<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ PlanSpark - 智能学习计划表</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --accent: #10b981;
            --warning: #f59e0b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 2.5rem; }
        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #818cf8 0%, #34d399 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        header p { color: var(--text-sub); font-size: 1rem; }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 1.5rem;
        }
        @media (max-width: 768px) { .grid-layout { grid-template-columns: 1fr; } }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.85rem; color: var(--text-sub); margin-bottom: 0.4rem; }
        input, select {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            border: 1px solid var(--card-border);
            background: rgba(15, 23, 42, 0.6);
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
        }
        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .btn {
            width: 100%;
            padding: 0.8rem;
            border: none;
            border-radius: 10px;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }
        .btn:hover { background: var(--primary-hover); transform: translateY(-1px); }

        /* Progress Bar */
        .progress-section { margin-bottom: 1.5rem; }
        .progress-header { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 0.5rem; }
        .progress-bar-bg { height: 10px; background: rgba(255, 255, 255, 0.1); border-radius: 999px; overflow: hidden; }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transition: width 0.4s ease;
        }

        /* Task List */
        .task-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; max-height: 380px; overflow-y: auto; }
        .task-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 1rem;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            transition: all 0.2s;
        }
        .task-item.completed { opacity: 0.6; }
        .task-item.completed .task-text { text-decoration: line-through; color: var(--text-sub); }
        .task-checkbox { width: 20px; height: 20px; accent-color: var(--accent); cursor: pointer; }
        .task-info { flex: 1; }
        .task-text { font-size: 0.95rem; font-weight: 500; }
        .task-badge {
            display: inline-block;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 999px;
            margin-top: 2px;
            font-weight: 600;
        }
        .badge-daily { background: rgba(99, 102, 241, 0.2); color: #a5b4fc; }
        .badge-longterm { background: rgba(245, 158, 11, 0.2); color: #fde68a; }

        .btn-delete { background: transparent; border: none; color: #ef4444; cursor: pointer; font-size: 1.1rem; opacity: 0.6; }
        .btn-delete:hover { opacity: 1; }

        .cron-sim-box {
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 12px;
        }
        .cron-sim-box h4 { font-size: 0.9rem; color: var(--warning); margin-bottom: 0.5rem; }
        .cron-sim-box p { font-size: 0.8rem; color: var(--text-sub); margin-bottom: 0.8rem; line-height: 1.4; }
        .btn-sim {
            background: rgba(245, 158, 11, 0.2);
            color: #fde68a;
            border: 1px solid rgba(245, 158, 11, 0.4);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 100;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal {
            background: #1e293b;
            border: 1px solid var(--card-border);
            border-radius: 16px;
            max-width: 500px;
            width: 100%;
            padding: 1.5rem;
        }
        .modal-header { font-weight: 700; font-size: 1.1rem; margin-bottom: 1rem; color: var(--accent); }
        .email-preview {
            background: #0f172a;
            border-radius: 8px;
            padding: 1rem;
            font-size: 0.85rem;
            line-height: 1.5;
            color: #cbd5e1;
            border: 1px dashed var(--card-border);
            margin-bottom: 1rem;
        }
        .email-preview ul { margin-left: 1.2rem; margin-top: 0.5rem; color: #f87171; }
        .close-btn { background: var(--card-border); color: var(--text-main); border: none; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; float: right; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>⚡ PlanSpark 智能计划表</h1>
        <p>设定目标 · 每日打卡 · GitHub Actions 晚间自动化邮件提醒</p>
    </header>

    <div class="grid-layout">
        <!-- 侧边栏：创建新计划 -->
        <div class="card">
            <div class="card-title">✨ 创建新计划</div>
            <form id="plan-form">
                <div class="form-group">
                    <label>计划名称</label>
                    <input type="text" id="task-title" placeholder="例如：精读 React 源码 1 章" required>
                </div>
                <div class="form-group">
                    <label>计划类型</label>
                    <select id="task-type">
                        <option value="daily">📅 日常习惯（每日重复）</option>
                        <option value="longterm">🎯 长期目标阶段拆解</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>接收定时邮件的邮箱</label>
                    <input type="email" id="user-email" placeholder="yourname@example.com" value="demo_user@example.com">
                </div>
                <button type="submit" class="btn" id="submit-btn">+ 添加到 Firebase 数据库</button>
            </form>

            <div class="cron-sim-box">
                <h4>🤖 Actions 自动化模拟器</h4>
                <p>点击下方按钮，模拟今晚 24:00 GitHub Actions 从 Firebase 读取未完成数据并触发发信的效果。</p>
                <button class="btn-sim" onclick="simulateCronMail()">⚡ 模拟今晚定时触发发信</button>
            </div>
        </div>

        <!-- 主内容：今日任务与进度 -->
        <div class="card">
            <div class="card-title">📌 今日打卡清单</div>

            <div class="progress-section">
                <div class="progress-header">
                    <span>今日完成度</span>
                    <span id="progress-text">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progress-fill"></div>
                </div>
            </div>

            <ul class="task-list" id="task-container">
                <li style="text-align:center; color:var(--text-sub); padding:2rem;">正在连接云端 Firebase 数据库...</li>
            </ul>
        </div>
    </div>
</div>

<!-- 模拟邮件弹窗 -->
<div class="modal-overlay" id="email-modal">
    <div class="modal">
        <div class="modal-header">📧 [GitHub Actions 触发通知] 晚间未完成任务提醒</div>
        <div class="email-preview" id="email-content"></div>
        <button class="close-btn" onclick="closeModal()">关闭预览</button>
    </div>
</div>

<!-- Firebase Modular SDK -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { 
        getFirestore, 
        collection, 
        addDoc, 
        updateDoc, 
        deleteDoc, 
        doc, 
        onSnapshot, 
        serverTimestamp 
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // 1. 你的 Firebase 账号配置信息
    const firebaseConfig = {
        apiKey: "AIzaSyA7e7n4EtWlglUjUzA77J1C3a-vYxc4AH4",
        authDomain: "schedule-36562.firebaseapp.com",
        projectId: "schedule-36562",
        storageBucket: "schedule-36562.firebasestorage.app",
        messagingSenderId: "157226250927",
        appId: "1:157226250927:web:b2c128780052e88ccada5a",
        measurementId: "G-1KPYMNP5ZS"
    };

    // 2. 初始化 Firebase 与 Firestore 数据库实例
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const tasksCollection = collection(db, "tasks");

    let tasks = [];

    // DOM 元素引用
    const taskContainer = document.getElementById('task-container');
    const progressFill = document.getElementById('progress-fill');
    const progressText = document.getElementById('progress-text');
    const planForm = document.getElementById('plan-form');

    // 3. 实时监听 Firestore 数据库改动 (Real-time Listener)
    onSnapshot(tasksCollection, (snapshot) => {
        tasks = snapshot.docs.map(doc => ({
            id: doc.id,
            ...doc.data()
        }));
        render();
    }, (error) => {
        console.error("读取 Firebase 失败:", error);
        taskContainer.innerHTML = `<li style="text-align:center; color:#ef4444; padding:1.5rem;">⚠️ 数据库读取失败！<br><span style="font-size:0.8rem; color:var(--text-sub);">请检查 Firebase 控制台中 Firestore 数据库是否已启用，且安全规则（Rules）允许读写。</span></li>`;
    });

    // 渲染 UI 列表
    function render() {
        taskContainer.innerHTML = '';
        if (tasks.length === 0) {
            taskContainer.innerHTML = '<li style="text-align:center; color:var(--text-sub); padding:2rem;">数据库中暂无计划，快创建一个吧！</li>';
        } else {
            tasks.forEach(task => {
                const li = document.createElement('li');
                li.className = `task-item ${task.completed ? 'completed' : ''}`;
                const badgeText = task.type === 'daily' ? '日常' : '长期拆解';
                const badgeClass = task.type === 'daily' ? 'badge-daily' : 'badge-longterm';

                li.innerHTML = `
                    <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask('${task.id}', ${task.completed})">
                    <div class="task-info">
                        <div class="task-text">${escapeHtml(task.title)}</div>
                        <span class="task-badge ${badgeClass}">${badgeText}</span>
                    </div>
                    <button class="btn-delete" onclick="deleteTask('${task.id}')">×</button>
                `;
                taskContainer.appendChild(li);
            });
        }
        updateProgress();
    }

    // 4. 新增任务提交写入 Firestore (addDoc)
    planForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const titleInput = document.getElementById('task-title');
        const typeInput = document.getElementById('task-type');

        if (!titleInput.value.trim()) return;

        try {
            await addDoc(tasksCollection, {
                title: titleInput.value.trim(),
                type: typeInput.value,
                completed: false,
                createdAt: serverTimestamp()
            });
            titleInput.value = '';
        } catch (err) {
            console.error("添加任务失败:", err);
            alert("写入数据库失败，请检查控制台或 Firebase 安全规则！");
        }
    });

    // 5. 挂载全局函数：更新打卡状态 (updateDoc)
    window.toggleTask = async (id, currentCompleted) => {
        try {
            const taskRef = doc(db, "tasks", id);
            await updateDoc(taskRef, {
                completed: !currentCompleted
            });
        } catch (err) {
            console.error("更新打卡状态失败:", err);
        }
    };

    // 6. 挂载全局函数：删除任务 (deleteDoc)
    window.deleteTask = async (id) => {
        try {
            const taskRef = doc(db, "tasks", id);
            await deleteDoc(taskRef);
        } catch (err) {
            console.error("删除任务失败:", err);
        }
    };

    // 7. 挂载全局函数：模拟 Cron 发信预览
    window.simulateCronMail = () => {
        const email = document.getElementById('user-email').value || 'user@example.com';
        const uncompletedTasks = tasks.filter(t => !t.completed);

        const modal = document.getElementById('email-modal');
        const emailContent = document.getElementById('email-content');

        let html = `<p><strong>收件人：</strong> ${escapeHtml(email)}</p>`;
        html += `<p><strong>数据源：</strong> Firebase Cloud Firestore (collection: 'tasks')</p>`;
        html += `<p><strong>触发方式：</strong> GitHub Actions Bot (cron: '0 16 * * *')</p><hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin:0.8rem 0;">`;
        html += `<p>👋 嗨！今晚从 Firebase 数据库读取到的学习总结如下：</p>`;
        
        if (uncompletedTasks.length > 0) {
            html += `<p style="margin-top:0.5rem;">⚠️ <strong>你今天还有 ${uncompletedTasks.length} 项任务未完成：</strong></p><ul>`;
            uncompletedTasks.forEach(t => {
                html += `<li>${escapeHtml(t.title)} (${t.type === 'daily' ? '日常' : '长期'})</li>`;
            });
            html += `</ul><p style="margin-top:0.5rem;">建议今晚抽空完成，或者合理调整明天的计划！💪</p>`;
        } else {
            html += `<p style="margin-top:0.5rem; color:#34d399;">🎉 <strong>太棒了！你今天完成了所有的计划！继续保持！</strong></p>`;
        }

        emailContent.innerHTML = html;
        modal.classList.add('active');
    };

    window.closeModal = () => {
        document.getElementById('email-modal').classList.remove('active');
    };

    function updateProgress() {
        if (tasks.length === 0) {
            progressFill.style.width = '0%';
            progressText.innerText = '0%';
            return;
        }
        const completedCount = tasks.filter(t => t.completed).length;
        const percentage = Math.round((completedCount / tasks.length) * 100);
        progressFill.style.width = `${percentage}%`;
        progressText.innerText = `${percentage}% (${completedCount}/${tasks.length})`;
    }

    function escapeHtml(text) {
        return text ? text.replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m])) : '';
    }
</script>
</body>
</html>
